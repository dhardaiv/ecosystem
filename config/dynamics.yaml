# WM-3 dynamics configuration — RSSM, encoder, aggregator, and heads.

rssm:
  h_dim: 512              # GRU deterministic state dimensionality
  z_cats: 32              # number of categorical latent variables
  z_classes: 32           # classes per categorical variable (z_dim = 32 × 32 = 1024)
  tau: 0.5                # Gumbel-Softmax temperature (straight-through)
  activation: silu

encoder:
  grid_channels: [32, 64, 128, 256]   # CNN channel progression (4 stride-2 layers)
  grid_kernel: 4
  grid_stride: 2
  grid_padding: 1
  grid_shape: [3, 64, 64]             # input RGB patch
  scalar_hidden: 128                   # MLP hidden dim for scalar features
  scalar_dim: 16                       # number of scalar input features
  e_dim: 512                           # output embedding dimensionality

aggregator:
  x_dim: 1536             # h_dim + z_dim  (512 + 1024)
  qk_dim: 64              # query / key projection dimensionality
  scale_by_sqrt: true      # divide attention logits by √qk_dim

heads:
  s_dim: 1536             # joint-state input dimension (= x_dim)

  decoder:
    fc_hidden: 4096        # 256 × 4 × 4 — projected to spatial feature map
    cnn_channels: [128, 64, 32, 3]     # transposed-CNN channel sequence
    output_shape: [3, 64, 64]

  reward:
    hidden_layers: [512, 256]
    output_dim: 1
    space: symlog           # predictions live in symlog-compressed space

  continue:
    hidden_layers: [512, 256]
    output_dim: 1
    activation: sigmoid     # outputs survival probability ∈ [0, 1]

  critic:
    hidden_layers: [512, 256]
    output_dim: 1
    stop_gradient: true     # sg(sₜ) applied to input

  actor:
    hidden_layers: [512, 256]
    stop_gradient: true     # sg(sₜ) applied to input
    # output_dim derived from act_dim at runtime

imagination:
  horizon: 15              # number of open-loop prior rollout steps
  actor_tau: 1.0           # Gumbel-Softmax τ for action sampling during imagination
